name: Build WordPress Image

on:
  push:
    branches:
      - main
    paths:
      - "images/wordpress/**"
      - ".github/workflows/build-wordpress.yml"

  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Push WordPress Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./images/wordpress
          file: ./images/wordpress/Dockerfile
          push: true
          tags: |
            ghcr.io/wienni112/pterodactyl-wordpress:latest
            ghcr.io/wienni112/pterodactyl-wordpress:php8.3
            ghcr.io/wienni112/pterodactyl-wordpress:php8.3-nginx